<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#1a73e8"/>
  <!-- Truck body -->
  <rect x="6" y="20" width="22" height="12" rx="2" fill="#ffffff"/>
  <!-- Truck cab -->
  <rect x="28" y="24" width="12" height="8" rx="2" fill="#e8f0fe"/>
  <polygon points="28,24 28,20 38,20 40,24" fill="#e8f0fe"/>
  <!-- Wheels -->
  <circle cx="13" cy="33" r="3.5" fill="#1a73e8" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="13" cy="33" r="1.2" fill="#ffffff"/>
  <circle cx="34" cy="33" r="3.5" fill="#1a73e8" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="34" cy="33" r="1.2" fill="#ffffff"/>
  <!-- NLT text -->
  <text x="24" y="17" font-family="Arial, sans-serif" font-size="8" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="1">NLT</text>
</svg>
